<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>RepairShop | Login</title>
    <style>
        :root {
            --ink: #11213b;
            --bg: linear-gradient(130deg, #f8fff4, #edf7ff);
            --panel: #ffffff;
            --primary: #0d849a;
            --primary-dark: #066778;
            --ring: #9de8f5;
        }

        * { box-sizing: border-box; }

        body {
            margin: 0;
            min-height: 100vh;
            display: grid;
            place-items: center;
            font-family: "Segoe UI", "Trebuchet MS", sans-serif;
            color: var(--ink);
            background: var(--bg);
            padding: 1rem;
        }

        .panel {
            width: min(460px, 100%);
            background: var(--panel);
            border-radius: 18px;
            border: 1px solid #d7e8f6;
            box-shadow: 0 16px 36px rgba(8, 25, 42, 0.12);
            padding: 1.4rem;
            animation: reveal .45s ease-out both;
        }

        h1 {
            margin: .4rem 0 .2rem;
            font-size: clamp(1.6rem, 4vw, 2rem);
        }

        p { margin-top: 0; color: #395276; }

        form { display: grid; gap: .9rem; }

        label {
            display: block;
            margin-bottom: .35rem;
            font-weight: 700;
            font-size: .92rem;
        }

        input {
            width: 100%;
            border: 1px solid #b7cde4;
            border-radius: 10px;
            padding: .7rem .75rem;
            font-size: 1rem;
            outline: none;
        }

        input:focus {
            border-color: var(--primary);
            box-shadow: 0 0 0 3px var(--ring);
        }

        button {
            border: 0;
            border-radius: 10px;
            padding: .75rem 1rem;
            color: #fff;
            font-weight: 700;
            cursor: pointer;
            background: linear-gradient(135deg, var(--primary), var(--primary-dark));
        }

        .back {
            margin-top: .8rem;
            display: inline-block;
            color: #0b6780;
            text-decoration: none;
            font-weight: 600;
        }

        .errorlist {
            margin: 0;
            padding: .5rem .75rem;
            border-radius: 8px;
            list-style: none;
            background: #ffe7e7;
            color: #8e1e1e;
            font-size: .9rem;
        }

        @keyframes reveal {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }
    </style>
</head>
<body>
    {% load i18n %}
    <section class="panel">
        <h1>{% trans "Log in to your shop" %}</h1>
        <p>{% trans "Use your RepairShop account to open shop-specific functions." %}</p>

        <form method="post">
            {% csrf_token %}
            {{ form.non_field_errors }}

            <div>
                <label for="id_username">{% trans "Username" %}</label>
                {{ form.username }}
            </div>

            <div>
                <label for="id_password">{% trans "Password" %}</label>
                {{ form.password }}
            </div>

            <button type="submit">{% trans "Continue" %}</button>
        </form>

        <a class="back" href="{% url 'landing' %}">{% trans "Back to landing page" %}</a>
    </section>
</body>
</html>
