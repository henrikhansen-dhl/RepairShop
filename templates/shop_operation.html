<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>RepairShop | {{ title }}</title>
    <style>
        body {
            margin: 0;
            min-height: 100vh;
            color: #12243a;
            background: linear-gradient(160deg, #f8fffc, #ebf3ff);
            font-family: "Segoe UI", "Trebuchet MS", sans-serif;
            padding: 1.2rem;
        }

        .wrap {
            width: min(840px, 100%);
            margin: 0 auto;
            background: #fff;
            border: 1px solid #d6e6f5;
            border-radius: 14px;
            padding: 1rem;
            box-shadow: 0 12px 30px rgba(8, 25, 42, 0.1);
        }

        .btn {
            display: inline-block;
            border: 0;
            background: #0f7e93;
            color: #fff;
            text-decoration: none;
            border-radius: 9px;
            padding: .55rem .85rem;
            font-weight: 700;
        }

        .note {
            margin-top: .8rem;
            border: 1px solid #d7e7f6;
            border-radius: 10px;
            background: #f5fbff;
            padding: .75rem;
        }
        .shop-logo { max-height: 58px; width: auto; display: block; margin: .5rem 0; border: 1px solid #d7e7f6; border-radius: 8px; background: #fff; padding: .2rem; }
    </style>
</head>
<body>
    {% load i18n %}
    <main class="wrap">
        <a class="btn" href="{% url 'shop_dashboard' %}">{% trans "Back to Dashboard" %}</a>
        <h1>{{ title }}</h1>
        <p><b>{% trans "Shop:" %}</b> {{ shop_name }}</p>
        {% if current_shop_logo_url %}
            <img class="shop-logo" src="{{ current_shop_logo_url }}" alt="{{ shop_name }} logo">
        {% endif %}
        <p>{{ description }}</p>

        <section class="note">
            {% trans "Feature scaffold is ready. Plug your domain models and workflows into this page." %}
        </section>
    </main>
</body>
</html>
